[project]
name = "geometadatatools"
version = "0.4.0"
description = "Extract metadata from geospatial data"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fiona>=1.10.1",
    "gdal>=3.10.3",
    "geopandas>=1.0.1",
    "matplotlib>=3.10.1",
    "metadataschemas>=0.1.2",
    "pydantic>=2.11.3",
    "pygeohash>=3.0.1",
]

[dependency-groups]
dev = [
    "detect-secrets>=1.5.0",
    "jupyter>=1.1.1",
    "pre-commit>=4.2.0",
    "pytest>=8.3.5",
    "ruff>=0.11.3",
]
